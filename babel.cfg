# Babel extraction config — drives `pybabel extract`.
#
# Includes Python sources (routes, helpers) and Jinja templates so any
# `_('...')` / `{% trans %}...{% endtrans %}` call lands in the .pot file.
# NOTE: babel's extractor prunes directories whose name starts with `_` or `.`
# (its default directory_filter), so `app/templates/_components/` is NEVER
# scanned regardless of the globs below. Macros there are locale-agnostic, but
# any *content* partial with `_()` strings must live in a non-underscore dir
# (e.g. `app/templates/partials/`) or its strings silently fall back to English.

[python: app/**.py]

[jinja2: app/templates/**.html]
extensions = jinja2.ext.i18n,jinja2.ext.do,jinja2.ext.loopcontrols
silent = true

# Plain-text email bodies (app/templates/emails/*.txt) carry the same
# {% trans %} / _() markup as the HTML templates, so they need the same
# extractor mapping.
[jinja2: app/templates/**.txt]
extensions = jinja2.ext.i18n,jinja2.ext.do,jinja2.ext.loopcontrols
silent = true
