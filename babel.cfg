# Babel extraction config — drives `pybabel extract`.
#
# Includes Python sources (routes, helpers) and Jinja templates so any
# `_('...')` / `{% trans %}...{% endtrans %}` call lands in the .pot file.
# `_components/` macros are scanned too — even though they're locale-
# agnostic today, callers may pass localised strings through them.

[python: app/**.py]

[jinja2: app/templates/**.html]
extensions = jinja2.ext.i18n,jinja2.ext.do,jinja2.ext.loopcontrols
silent = true
