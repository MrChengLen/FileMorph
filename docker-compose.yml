# FileMorph — Community Edition (single-container, anonymous + API-key auth)
#
# This is the default self-hosting recipe: one FastAPI container, no
# database, no accounts. API keys live in ./data/api_keys.json. The
# entrypoint generates a key on first run and prints it to the logs.
#
# Cloud Edition (user accounts, JWT, Stripe, admin cockpit) is an
# optional overlay. Run it with:
#
#     docker compose -f docker-compose.yml -f docker-compose.cloud.yml up -d
#
# That overlay adds a Postgres service, sets ``DATABASE_URL`` so the
# app starts in Cloud-Edition mode, and the entrypoint runs Alembic
# migrations before uvicorn starts.

services:
  filemorph:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - path: .env
        required: false
    restart: unless-stopped
    # Hardening — defence in depth on top of the non-root ``appuser`` in the
    # Dockerfile. ``no-new-privileges`` blocks setuid-style privilege
    # escalation inside the container; ``cap_drop: [ALL]`` removes every
    # Linux capability — the app neither binds a privileged port (8000 is
    # unprivileged) nor needs ``CAP_NET_RAW``/``CAP_DAC_OVERRIDE`` for any
    # converter. Adding ``read_only: true`` would need a writable ``/tmp``
    # tmpfs for Python's ``tempfile.mkdtemp`` (the fm_* scratch dirs); we
    # leave that to operators who want the stronger guarantee — uncomment
    # the two lines below and pair them with adequate tmpfs sizing.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # read_only: true
    # tmpfs:
    #   - /tmp:size=512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"
