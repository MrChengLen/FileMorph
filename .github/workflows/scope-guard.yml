name: Scope Guard

# Server-side guard: prevents ops-only files and operations-content
# from landing in the public repo. This is the only layer that cannot
# be bypassed with `git push --no-verify` — make it a required status
# check on `main` in the branch-protection ruleset.

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

# Cancel superseded runs on the same PR / feature branch; let
# main / develop runs finish (they are the gate for branch protection).
concurrency:
  group: scope-guard-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/develop' }}

jobs:
  scope-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine diff range
        id: range
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "BASE=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "HEAD=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            BASE="${{ github.event.before }}"
            if [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
              BASE=$(git rev-list --max-parents=0 HEAD | tail -n1)
            fi
            echo "BASE=$BASE" >> "$GITHUB_OUTPUT"
            echo "HEAD=${{ github.event.after }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Block ops-only files
        run: |
          set -e
          BASE="${{ steps.range.outputs.BASE }}"
          HEAD="${{ steps.range.outputs.HEAD }}"
          CHANGED=$(git diff --name-only "$BASE".."$HEAD" --diff-filter=ACM)
          echo "Changed files in range:"
          echo "$CHANGED"
          FORBIDDEN_RE='^(compose\.prod\.yml|deploy\.sh|\.env\.production(\..*)?|CLAUDE\.md)$|^runbooks/|^docs-internal/'
          BAD=$(echo "$CHANGED" | grep -E "$FORBIDDEN_RE" || true)
          if [ -n "$BAD" ]; then
            echo "::error::Forbidden ops-only paths in public repo (move to MrChengLen/filemorph-ops):"
            echo "$BAD"
            exit 1
          fi

      - name: Block strategic / business-internal docs
        run: |
          set -e
          BASE="${{ steps.range.outputs.BASE }}"
          HEAD="${{ steps.range.outputs.HEAD }}"
          CHANGED=$(git diff --name-only "$BASE".."$HEAD" --diff-filter=ACM)
          # Keep in sync with .githooks/pre-commit::INTERNAL_PATHS and
          # .githooks/pre-push::INTERNAL_PATHS. The hard-coded names cover
          # the historical 13 docs that triggered this rule; the *-strategy
          # / *-plan / marketing-* / sprint-* / persona-* / competitive-* /
          # engineering-pm-* / business-case-* / launch-*-tracker patterns
          # are the deny-by-default expansion (post-audit hardening — a
          # future ``docs/foo-strategy.md`` would otherwise slip past the
          # blocklist by virtue of having a fresh filename).
          INTERNAL_RE='^docs/(admin-cockpit|open-tasks|filemorph-io-runbook|marketing-plan|seo-strategy|business-case|claims-audit|launch-gate-snapshot|launch-readiness-tracker|seo-audit|user-acquisition-strategy|requirements-v2|sprint-5-multi-file-plan|.*-strategy|.*-plan|.*-roadmap|.*-internal|.*-runbook|marketing-.*|persona-.*|competitive-.*|engineering-pm-.*|business-case-.*|sprint-.*|launch-.*-tracker|launch-.*-snapshot|launch-.*-readiness)\.md$'
          BAD=$(echo "$CHANGED" | grep -E "$INTERNAL_RE" || true)
          if [ -n "$BAD" ]; then
            echo "::error::Strategic/internal docs in public repo (move to docs-internal/ — gitignored):"
            echo "$BAD"
            exit 1
          fi

      - name: Block ops-content patterns
        run: |
          set -e
          BASE="${{ steps.range.outputs.BASE }}"
          HEAD="${{ steps.range.outputs.HEAD }}"
          # Excluded paths use these strings legitimately (Self-Hoster-Doku,
          # Impressum/Privacy/Terms, GDPR-Design, COMMERCIAL-LICENSE).
          ADDED=$(git diff "$BASE".."$HEAD" -- \
            ':!docs/self-hosting.md' \
            ':!app/templates/privacy.html' \
            ':!app/templates/impressum.html' \
            ':!app/templates/terms.html' \
            ':!COMMERCIAL-LICENSE.md' \
            ':!docs/gdpr-account-deletion-design.md' \
            ':!docs/api-usage-guide.md' \
            ':!docs/dpa-template.md' \
            ':!docs/dpa-tom-annex.md' \
            ':!docs/records-of-processing-template.md' \
            ':!docs/commercial-license-agreement-template.md' \
            ':!.githooks/pre-commit' \
            ':!.githooks/pre-push' \
            ':!.github/workflows/scope-guard.yml' \
            ':!.github/workflows/notify-ops.yml' \
            | grep -E "^\+" | grep -Ev "^\+\+\+" || true)
          PATTERN='/opt/filemorph(/|$|[[:space:]])|/var/log/filemorph|/home/deploy([[:space:]]|/)|Hetzner CX|HETZNER_HOST|HETZNER_SSH_USER|HETZNER_SSH_KEY|OPS_REPO_DISPATCH_PAT|GHCR_PAT|appleboy/ssh-action|lennart\.seidel@icloud\.com|lennart@filemorph\.io'
          MATCHES=$(echo "$ADDED" | grep -E "$PATTERN" || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Forbidden ops-content in additions (move to MrChengLen/filemorph-ops):"
            echo "$MATCHES"
            exit 1
          fi
