name: SBOM

# Generates a CycloneDX-JSON Software Bill of Materials for every push to
# `main`, uploaded as a 90-day workflow artifact for continuous SBOM tracking.
# The artifact is named `filemorph-{version}.cdx.json` to line up with the
# references in docs/patch-policy.md and the EVB-IT-March-2026 SBOM mandate.
#
# Release attachment lives in `release.yml`, NOT here: a release published by
# the built-in GITHUB_TOKEN does not fire the `release: published` event
# (GitHub suppresses it to avoid recursive runs), so a `release`-triggered
# attach step here would silently never run. `release.yml` therefore generates
# and attaches the SBOM in the same job that publishes the release.
# `workflow_dispatch` stays so a maintainer can regenerate the artifact on
# demand (e.g. to back-fill a release cut before this split landed).
#
# Why "environment" and not "requirements": `cyclonedx-py environment`
# captures the actual installed graph including transitive dependencies
# with their resolved versions, which is what a vulnerability scanner
# wants to see. `cyclonedx-py requirements` would only emit the direct
# pins from requirements.txt and miss everything pulled in transitively.

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  generate-sbom:
    runs-on: ubuntu-latest
    permissions:
      contents: read  # only uploads a workflow artifact; release attach moved to release.yml
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install runtime dependencies
        run: pip install -r requirements.txt

      - name: Install CycloneDX generator
        # Pinned to the 5.x line for reproducibility; bump deliberately when
        # CycloneDX schema spec advances.
        run: pip install "cyclonedx-bom>=5,<6"

      - name: Determine version label
        id: version
        # main-push + workflow_dispatch only (release attach moved to
        # release.yml), so the label is always the commit short-SHA.
        run: echo "version=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Generate CycloneDX SBOM (JSON)
        run: |
          cyclonedx-py environment \
            --output-file "filemorph-${{ steps.version.outputs.version }}.cdx.json" \
            --output-format JSON

      - name: Upload SBOM as workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-${{ steps.version.outputs.version }}
          path: filemorph-*.cdx.json
          retention-days: 90
